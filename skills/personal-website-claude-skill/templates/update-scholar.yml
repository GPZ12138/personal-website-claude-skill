name: Update Scholar Data

# Polite daily refresh of Google Scholar stats.
# Tier 1 (lightweight profile-page GET) runs every day. Tier 2 (full
# `scholarly` scrape) only runs when Tier 1 sees a change in total
# citations, or when the workflow is manually dispatched with force=true.
on:
  schedule:
    # Once a day at 03:17 UTC (off-peak; non-round minute to avoid the
    # top-of-hour bot-traffic spike that Scholar rate-limits hardest).
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a full (Tier 2) scrape even if the lightweight check sees no change."
        type: boolean
        default: false
  push:
    paths:
      - "scripts/fetch_scholar.py"
      - "scripts/requirements.txt"
      - ".github/workflows/update-scholar.yml"

permissions:
  contents: write

concurrency:
  group: update-scholar
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch Google Scholar stats
        env:
          # Set this to the `user=...` value from your Scholar profile URL.
          # Example: https://scholar.google.com/citations?user=ABC123XYZ → "ABC123XYZ"
          SCHOLAR_ID: REPLACE_WITH_YOUR_SCHOLAR_ID
          FORCE_REFRESH: ${{ inputs.force }}
        run: python scripts/fetch_scholar.py

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scholar.json
          if git diff --cached --quiet; then
            echo "No changes in scholar data."
          else
            git commit -m "chore(data): refresh Google Scholar snapshot"
            git push
          fi
